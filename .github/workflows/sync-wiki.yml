name: Sync Wiki

on:
  push:
    branches: [master]
    paths:
      - 'wiki/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Clone wiki repo
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git wiki-repo || {
            echo "ERROR: Could not clone the wiki repo."
            echo "The GitHub wiki must be initialized before this Action can push to it."
            echo "Go to https://github.com/${{ github.repository }}/wiki"
            echo "click 'Create the first page', and save it before re-running this workflow."
            exit 1
          }

      - name: Copy pages and images
        run: |
          cp wiki/*.md wiki-repo/
          if [ -d wiki/images ]; then
            mkdir -p wiki-repo/images
            cp -r wiki/images/. wiki-repo/images/
          fi

      - name: Commit and push
        working-directory: wiki-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && echo "No changes to sync." || {
            git commit -m "Sync wiki from master [skip ci]"
            git push
            echo "Wiki updated successfully."
          }
